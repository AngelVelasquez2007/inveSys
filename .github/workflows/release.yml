name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      - name: Generate latest.json
        run: |
          $msi = Get-ChildItem -Path src-tauri/target/release/bundle/msi/*.msi | Select-Object -First 1
          $sig = Get-ChildItem -Path src-tauri/target/release/bundle/msi/*.sig | Select-Object -First 1
          $version = "${{ github.ref_name }}".TrimStart('v')
          $sigContent = Get-Content $sig.FullName -Raw
          $msiName = $msi.Name

          $json = @{
            version = $version
            notes = "Release ${{ github.ref_name }}"
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $sigContent.Trim()
                url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$msiName"
              }
            }
          }
          $json | ConvertTo-Json -Depth 10 | Set-Content -Path latest.json -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: InveSys-Windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.sig
            latest.json

  create-release:
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            InveSys-Windows/*.msi
            InveSys-Windows/*.sig
            InveSys-Windows/latest.json
          generate_release_notes: true
